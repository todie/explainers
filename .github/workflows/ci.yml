name: CI

# Build verification on every push to main and every pull request, followed
# by a wrangler-based deploy to Cloudflare Pages on push-to-main only.
#
# Two jobs:
#   build  — runs on every push/PR. Vite build + 5 artifact sanity checks.
#   deploy — runs only on push to main after a green build. Uploads dist/
#            to the explainers CF Pages project via wrangler-action@v3.
#
# Required repository secrets (set via `gh secret set` or the repo Settings
# UI):
#   CLOUDFLARE_API_TOKEN   — token scoped to `Pages:Edit` (plus R2 Write/Read
#                             so the runtime R2 binding path is provisionable
#                             by the same token). Matches the token at
#                             ~/.secrets line 16.
#   CLOUDFLARE_ACCOUNT_ID  — 07ae57cca8fc1a438f9c9b875d1e2283
#
# The deploy job uses `cloudflare/wrangler-action@v3`, which handles wrangler
# install + auth from the two secrets above. Build artifacts are passed from
# the `build` job via `actions/upload-artifact` + `actions/download-artifact`
# so we don't have to run `npm ci && npm run build` twice.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + artifact sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify per-route OG HTML files exist
        run: |
          set -euo pipefail
          expected=(memory-model gestalt prompt-cache lsp token-optimization reverie emotional-topology pidgin-tokens embodied-mind harness private)
          missing=0
          for route in "${expected[@]}"; do
            if [ ! -f "dist/$route/index.html" ]; then
              echo "::error::missing dist/$route/index.html — check scripts/generate-og-pages.mjs"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "$missing per-route OG HTML files are missing"
            exit 1
          fi
          echo "✓ all ${#expected[@]} per-route OG HTML files present"

      - name: Verify committed preview images exist
        run: |
          set -euo pipefail
          expected=(home memory-model gestalt prompt-cache lsp token-optimization reverie emotional-topology pidgin-tokens embodied-mind harness)
          missing=0
          for route in "${expected[@]}"; do
            f="public/previews/$route.jpeg"
            if [ ! -f "$f" ]; then
              echo "::error::missing $f — run scripts/generate-fallback-previews.mjs or wait for the weekly generate-previews workflow"
              missing=$((missing + 1))
              continue
            fi
            # Verify it's an actual JPEG (first 3 bytes are FF D8 FF)
            if ! head -c 3 "$f" | od -An -tx1 | grep -q 'ff d8 ff'; then
              echo "::error::$f exists but is not a valid JPEG"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "$missing preview images are missing or invalid"
            exit 1
          fi
          echo "✓ all ${#expected[@]} preview images present and JPEG-valid"

      - name: Verify Pages Functions are copied to dist
        run: |
          set -euo pipefail
          if [ ! -d functions/api/private ]; then
            echo "::error::functions/api/private/ directory missing"
            exit 1
          fi
          for f in 'functions/api/private/[doc].js' functions/api/private/index.js; do
            if [ ! -f "$f" ]; then
              echo "::error::$f missing"
              exit 1
            fi
          done
          echo "✓ Pages Functions present"

      - name: Verify private content is NOT bundled
        run: |
          set -euo pipefail
          # These slugs belong to CF Access-gated docs in R2. If any of them
          # end up in the public JS bundle, the build regressed PR #10's
          # security fix.
          leaks=$(grep -rE '(Revenue Floor|Term Sheet|Studio Financial|Founder Intake|Brand Guide|Portfolio Scorecard|Memory System Rework|Bipolar II|Neurochemistry|Context.{0,5}Memory.{0,5}Citations|Mission Statement)' dist/assets/ 2>/dev/null | head -5 || true)
          if [ -n "$leaks" ]; then
            echo "::error::Private content strings found in public JS bundle — PR #10 regression"
            echo "$leaks"
            exit 1
          fi
          echo "✓ no private content in public JS bundle"

      - name: Summarize
        run: |
          echo "=== build artifacts ==="
          ls -la dist/ | head -20
          echo
          echo "=== dist/assets/ size ==="
          du -sh dist/assets/ 2>/dev/null || true
          echo
          echo "=== Pages Functions ==="
          ls -la dist/functions/ 2>/dev/null || echo "(functions compiled at deploy time, not in dist/)"

      - name: Upload dist artifact
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist
            functions
            wrangler.toml
            public/_headers
          retention-days: 1
          include-hidden-files: false

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://explain.todie.io
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Sanity check artifact
        run: |
          set -euo pipefail
          test -f dist/index.html || (echo "::error::dist/index.html missing from artifact" && exit 1)
          test -d functions/api/private || (echo "::error::functions/api/private/ missing from artifact" && exit 1)
          test -f wrangler.toml || (echo "::error::wrangler.toml missing from artifact" && exit 1)
          echo "✓ artifact looks sane"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=explainers --branch=main --commit-dirty=true
          wranglerVersion: "4.80.0"

      - name: Verify live site after deploy
        run: |
          set -euo pipefail
          # Give the deploy a moment to propagate to the edge
          sleep 5
          for url in \
            https://explain.todie.io/ \
            https://explain.todie.io/embodied-mind/ \
            https://explain.todie.io/pidgin-tokens/ \
            https://explain.todie.io/private; do
            code=$(curl -sSLo /dev/null -w "%{http_code}" "$url")
            if [ "$code" != "200" ]; then
              echo "::warning::$url returned HTTP $code (deploy may still be propagating)"
            else
              echo "✓ $url → 200"
            fi
          done
          # Hard fail only if the root doesn't resolve at all
          root=$(curl -sSLo /dev/null -w "%{http_code}" https://explain.todie.io/)
          if [ "$root" != "200" ]; then
            echo "::error::https://explain.todie.io/ is not 200 after deploy — check Cloudflare Pages dashboard"
            exit 1
          fi

  preview:
    name: Deploy PR preview to Cloudflare Pages
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Compute branch slug
        id: slug
        run: |
          # Cloudflare Pages slugifies branch names by replacing
          # non-alphanumeric characters with hyphens. The resulting branch
          # alias URL is https://<slug>.<project>.pages.dev
          raw="${{ github.head_ref }}"
          slug=$(echo "$raw" | tr '/_' '--' | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]/-/g; s/-+/-/g; s/^-+|-+$//g')
          # CF Pages caps branch alias slugs at 28 characters
          slug=$(echo "$slug" | cut -c1-28 | sed -E 's/-+$//')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "Branch slug: $slug"

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=explainers --branch=${{ steps.slug.outputs.slug }} --commit-dirty=true
          wranglerVersion: "4.80.0"

      - name: Compose preview URL
        id: url
        run: |
          # wrangler-action's deployment-url output is unreliable for the
          # pages-deploy command (returns empty for branch aliases). The
          # branch-alias URL is stable across redeploys and is what we
          # actually want to link to, so we compute it ourselves.
          alias="https://${{ steps.slug.outputs.slug }}.explainers.pages.dev"
          echo "alias=$alias" >> "$GITHUB_OUTPUT"

      - name: Post sticky preview comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: impeccable-preview
          message: |
            <!-- impeccable-preview -->
            ### Preview deployed

            | Route | Link |
            | --- | --- |
            | Home | ${{ steps.url.outputs.alias }}/ |
            | Harness explainer | ${{ steps.url.outputs.alias }}/harness |

            Branch alias is stable across pushes — this URL updates in
            place on every commit to `${{ github.head_ref }}`. Built from
            `${{ github.event.pull_request.head.sha }}`.

      - name: Smoke-test the preview
        run: |
          set -euo pipefail
          sleep 8
          for path in / /harness; do
            url="${{ steps.url.outputs.alias }}$path"
            code=$(curl -sSLo /dev/null -w "%{http_code}" "$url")
            if [ "$code" = "200" ]; then
              echo "✓ $url → 200"
            else
              echo "::warning::$url → $code (preview may still be propagating)"
            fi
          done
