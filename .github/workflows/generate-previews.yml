name: Generate Project Previews

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 04:00 UTC
    - cron: '0 4 * * 1'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No private-content decryption step: as of the CF Access migration,
      # private docs live in R2 + are fetched at runtime by a gated Pages
      # Function, not imported at build time. The snapshot config
      # (snapshot.config.mjs) only targets public explainer routes, so the
      # build + preview run does not need any R2 credentials.

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install uri-snapshot
        run: npm install --no-save github:todie/uri-snapshot

      - name: Install Playwright browsers
        run: node_modules/.bin/playwright install chromium --with-deps

      - name: Build, serve, and capture previews
        run: |
          npm run build
          # Serve in background, track PID, ensure cleanup. Vite preview
          # serves from the configured base (`/` per vite.config.js) on
          # port 4173, so the health-check and uri-snapshot both target
          # the site root, not `/explainers/`.
          npx vite preview --port 4173 > /tmp/vite.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT

          # Wait for server (up to 15s)
          for i in $(seq 1 15); do
            curl -sf http://localhost:4173/ > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:4173/ > /dev/null || (cat /tmp/vite.log && exit 1)

          # Capture previews — EXPLAINER_BASE_URL enables the explainer
          # page targets defined in snapshot.config.mjs.
          EXPLAINER_BASE_URL=http://localhost:4173 \
            node_modules/.bin/uri-snapshot --config snapshot.config.mjs --results public/previews/results.json

      - name: Commit previews
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/previews/
          git diff --staged --quiet \
            && echo 'No preview changes.' \
            || (git commit -m 'chore(previews): regenerate project + explainer screenshots' && git push)
