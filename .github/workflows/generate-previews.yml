name: Generate Project Previews

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 04:00 UTC
    - cron: '0 4 * * 1'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install uri-snapshot
        run: npm install --no-save github:todie/uri-snapshot

      - name: Install Playwright browsers
        run: node_modules/.bin/playwright install chromium --with-deps

      - name: Generate previews
        run: node_modules/.bin/uri-snapshot --config snapshot.config.mjs --results public/previews/results.json

      - name: Commit previews
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/previews/
          git diff --staged --quiet \
            && echo 'No preview changes.' \
            || (git commit -m 'chore(previews): regenerate project screenshots [skip ci]' && git push)
